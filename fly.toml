# fly.toml app configuration file generated for gpsnetball3-4 on 2026-05-09T04:59:55Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'gpsnetball3-4'
primary_region = 'syd'

[build]

[[mounts]]
  source = 'netball_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
